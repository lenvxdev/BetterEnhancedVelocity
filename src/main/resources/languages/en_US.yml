general:
  raw_prefix: "[BetterEnhancedVelocity]"
  prefix: "<gradient:dark_aqua:aqua>BetterEnhancedVelocity</gradient> <dark_gray>|</dark_gray>"
  console_prefix: "<gray>[<gradient:dark_aqua:aqua>BEV</gradient>]</gray>"
  successful_prefix: "<dark_gray>[</dark_gray><dark_green><bold>✔</bold></dark_green><dark_gray>]</dark_gray>"
  warn_prefix: "<dark_gray>[</dark_gray><gold><bold>!</bold></gold><dark_gray>]</dark_gray>"
  error_prefix: "<dark_gray>[</dark_gray><dark_red><bold>✘</bold></dark_red><dark_gray>]</dark_gray>"
  only_players: "$error_prefix <red>Only players can use this command."
  player_not_found: "$error_prefix <red>Player not found!"
  server_not_found: "$error_prefix <red>Server not found!"
  valid_parameters: "$error_prefix <red>Invalid parameter. <dark_gray>($argument)"
command:
  no_permission: "$error_prefix <red>You don't have permission to use this command. <dark_gray>($permission)"
features:
  bev:
    command:
      reload_success: "$successful_prefix <green>Configuration reloaded successfully."
      usage: "$warn_prefix <gold>Usage: <yellow>/bev <gray>[reload|help]"
  help:
    command:
      header: "<bold><gradient:dark_aqua:aqua><st>               </st></gradient></bold> <gradient:aqua:white><bold>Server Help</bold></gradient> <bold><gradient:aqua:dark_aqua><st>               </st></gradient></bold>"
      plugin_header: "<dark_aqua>◆ <aqua><bold>$plugin</bold></aqua>"
      entry: "  <dark_gray>» <white>/$command <gray>— <dark_gray>$description"
    descriptions:
      glist: "List all players across every server"
      find: "Find which server a player is on"
      send: "Send a player to a server"
      alert: "Broadcast a message with the plugin prefix"
      broadcast: "Send a raw MiniMessage broadcast to all players"
      ping: "Check your ping or another player's"
      kickall: "Kick all players from a server or the proxy"
      move: "Move players to a destination server"
      bev: "Reload config or get admin help"
  global_list:
    header: "<bold><gradient:gold:yellow><st>         </st></gradient></bold> <gradient:blue:aqua><bold>Network Player List</bold></gradient> <dark_gray>(<gray>$count</gray>)</dark_gray> <bold><gradient:yellow:gold><st>         </st></gradient></bold>"
    no_one_playing: "<gray><italic>No one is playing on this server.</italic></gray>"
    server: "<hover:show_text:'<aqua>Players:<newline><gray>$players</gray>'><gray>[<gradient:green:yellow:gold:red:dark_red>$progress</gradient><gray>] <dark_gray>(<gray>$count</gray>)</dark_gray> <white>» <aqua>$server"
  find:
    command:
      usage: "$warn_prefix <gold>Usage: <yellow>/find <user>"
      use: "$successful_prefix <green><gold>$player</gold> is on <gold>$server</gold>.$vanished"
      vanished: " <dark_gray>(Vanished)</dark_gray>"
      no_target: "$error_prefix <red>Player not found!"
      no_server: "$warn_prefix <red>Could not get <aqua>$player</aqua>'s server. Try again later."
  send:
    command:
      usage: "$warn_prefix <gold>Usage: <yellow>/send <user> <server>"
      use: "$successful_prefix <green><gold>$player</gold> has been sent to <gold>$server</gold>."
  alert:
    command:
      usage: "$warn_prefix <gold>Usage: <yellow>/alert <message>"
      use: "$prefix <white>$message"
  broadcast:
    command:
      usage: "$warn_prefix <gold>Usage: <yellow>/broadcast <message>"
      use: "$message"
  ping:
    command:
      use: "$successful_prefix <green>Your ping is <aqua>$ping</aqua>ms."
      no_target: "$error_prefix <red>Player not found!"
      use_target: "$successful_prefix <green><gold>$player</gold>'s ping is <aqua>$ping</aqua>ms."
  kickall:
    command:
      use: "$successful_prefix <green>Kicked all players from <yellow>$server</yellow>."
      usage: "$warn_prefix <gold>Usage: <yellow>/kickall <server|all>"
      no_server: "$error_prefix <red>Server not found!"
      reason: "<red>You have been kicked by an administrator."
  move:
    command:
      usage: "$warn_prefix <gold>Usage: <yellow>/move <player|server:<server>|all> <destination>"
      success: "$successful_prefix <green>Moved <gold>$count</gold> player(s) to <gold>$destination</gold>."
      no_players_found: "$error_prefix <red>No players found matching that selection."
      already_on_server: "$warn_prefix <gold>$count</gold> player(s) were already on <gold>$server</gold>."
      failed: "$error_prefix <red>Failed to move <gold>$count</gold> player(s)."
