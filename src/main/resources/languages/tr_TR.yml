general:
  raw_prefix: "[BetterEnhancedVelocity]"
  prefix: "<gradient:dark_aqua:aqua>BetterEnhancedVelocity</gradient> <dark_gray>|</dark_gray>"
  console_prefix: "<gray>[<gradient:dark_aqua:aqua>BEV</gradient>]</gray>"
  successful_prefix: "<dark_gray>[</dark_gray><dark_green><bold>✔</bold></dark_green><dark_gray>]</dark_gray>"
  warn_prefix: "<dark_gray>[</dark_gray><gold><bold>!</bold></gold><dark_gray>]</dark_gray>"
  error_prefix: "<dark_gray>[</dark_gray><dark_red><bold>✘</bold></dark_red><dark_gray>]</dark_gray>"
  only_players: "$error_prefix <red>Bu komutu yalnızca oyuncular kullanabilir."
  player_not_found: "$error_prefix <red>Oyuncu bulunamadı!"
  server_not_found: "$error_prefix <red>Sunucu bulunamadı!"
  valid_parameters: "$error_prefix <red>Geçersiz parametre. <dark_gray>($argument)"
command:
  no_permission: "$error_prefix <red>Bu komutu kullanma izniniz yok. <dark_gray>($permission)"
features:
  bev:
    command:
      reload_success: "$successful_prefix <green>Yapılandırma başarıyla yeniden yüklendi."
      usage: "$warn_prefix <gold>Kullanım: <yellow>/bev <gray>[reload|help]"
  help:
    command:
      header: "<bold><gradient:dark_aqua:aqua><st>               </st></gradient></bold> <gradient:aqua:white><bold>Sunucu Yardım</bold></gradient> <bold><gradient:aqua:dark_aqua><st>               </st></gradient></bold>"
      plugin_header: "<dark_aqua>◆ <aqua><bold>$plugin</bold></aqua>"
      entry: "  <dark_gray>» <white>/$command <gray>— <dark_gray>$description"
    descriptions:
      glist: "Tüm sunuculardaki oyuncuları listele"
      find: "Bir oyuncunun hangi sunucuda olduğunu bul"
      send: "Bir oyuncuyu sunucuya gönder"
      alert: "Tüm oyunculara eklenti önekiyle mesaj yayınla"
      broadcast: "Tüm oyunculara ham MiniMessage yayını gönder"
      ping: "Kendi ya da başka bir oyuncunun pingini görüntüle"
      kickall: "Bir sunucudan veya proxy'den tüm oyuncuları at"
      move: "Oyuncuları hedef sunucuya taşı"
      bev: "Yapılandırmayı yeniden yükle veya yönetici yardımını gör"
  global_list:
    header: "<bold><gradient:gold:yellow><st>         </st></gradient></bold> <gradient:blue:aqua><bold>Ağ Oyuncu Listesi</bold></gradient> <dark_gray>(<gray>$count</gray>)</dark_gray> <bold><gradient:yellow:gold><st>         </st></gradient></bold>"
    no_one_playing: "<gray><italic>Bu sunucuda kimse oynamıyor.</italic></gray>"
    server: "<hover:show_text:'<aqua>Oyuncular:<newline><gray>$players</gray>'><gray>[<gradient:green:yellow:gold:red:dark_red>$progress</gradient><gray>] <dark_gray>(<gray>$count</gray>)</dark_gray> <white>» <aqua>$server"
  find:
    command:
      usage: "$warn_prefix <gold>Kullanım: <yellow>/find <kullanıcı>"
      use: "$successful_prefix <green><gold>$player</gold> <gold>$server</gold> sunucusunda.$vanished"
      vanished: " <dark_gray>(Görünmez)</dark_gray>"
      no_target: "$error_prefix <red>Oyuncu bulunamadı!"
      no_server: "$warn_prefix <red><aqua>$player</aqua> adlı oyuncunun sunucusu alınamadı. Daha sonra tekrar deneyin."
  send:
    command:
      usage: "$warn_prefix <gold>Kullanım: <yellow>/send <kullanıcı> <sunucu>"
      use: "$successful_prefix <green><gold>$player</gold>, <gold>$server</gold> sunucusuna gönderildi."
  alert:
    command:
      usage: "$warn_prefix <gold>Kullanım: <yellow>/alert <mesaj>"
      use: "$prefix <white>$message"
  broadcast:
    command:
      usage: "$warn_prefix <gold>Kullanım: <yellow>/broadcast <mesaj>"
      use: "$message"
  ping:
    command:
      use: "$successful_prefix <green>Pinginiz: <aqua>$ping</aqua>ms."
      no_target: "$error_prefix <red>Oyuncu bulunamadı!"
      use_target: "$successful_prefix <green><gold>$player</gold>'ın pingi: <aqua>$ping</aqua>ms."
  kickall:
    command:
      use: "$successful_prefix <green><yellow>$server</yellow> sunucusundaki tüm oyuncular atıldı."
      usage: "$warn_prefix <gold>Kullanım: <yellow>/kickall <sunucu|all>"
      no_server: "$error_prefix <red>Sunucu bulunamadı!"
      reason: "<red>Bir yönetici tarafından atıldınız."
  move:
    command:
      usage: "$warn_prefix <gold>Kullanım: <yellow>/move <oyuncu|server:<sunucu>|all> <hedef>"
      success: "$successful_prefix <green><gold>$count</gold> oyuncu(lar) başarıyla <gold>$destination</gold> sunucusuna taşındı."
      no_players_found: "$error_prefix <red>Bu seçime uyan oyuncu bulunamadı."
      already_on_server: "$warn_prefix <gold>$count</gold> oyuncu(lar) zaten <gold>$server</gold> sunucusundaydı."
      failed: "$error_prefix <red><gold>$count</gold> oyuncu(lar) taşınamadı."
